<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Archive Account Leveling Estimator</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="manifest" href="assets/site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="panel-container">
        <h1 class="gradient">Blue Archive Leveling Calculator</h1>
        <p class="tagline">Blue Archive Leveling and Resource Predictor</p>
        
        <div class="form-layout">
            <div class="form-group">
                <label for="CurrentLevel">CurrentLevel:</label>
                <input type="number" id="CurrentLevel" placeholder="1-89" min="1" max="89">
            </div>
            
            <div class="form-group">
                <label for="CurrentXPInLevel">Current Level XP</label>
                <input type="number" id="CurrentXPInLevel" placeholder="ex. 50">
            </div>

            <div class="form-group">
                <label for="TargetLevel">Target Level</label>
                <input type="number" id="TargetLevel" placeholder="2-90" min="2" max="90">
            </div>

            <div class="form-group">
                <label for="CafeLevel">Cafe Level:</label>
                <input type="number" id="CafeLevel" placeholder="1-10" min="1" max="10">
            </div>

            <div class="form-group">
                <label for="TacticalChallengeRefreshes">Tactical Challenge Refreshes:</label>
                <input type="number" id="TacticalChallengeRefreshes" placeholder="0-4" min="1" max="4">
            </div>

            <div class="form-group">
                <label for="APRefreshes">Pyroxene Refreshes:</label>
                <input type="number" id="APRefreshes" placeholder="0-20" min="0" max="20">
            </div>
        </div>

        <button onclick="Calculate()"><span>Calculate</span></button>

        <div id="output-panel" class="output-wrapper hidden">
        <h3>Results</h3>
            <div class="metric"><span class="label">Estimated Time:</span><span id="ResultTime" class="val">-</span></div>
            <div class="metric"><span class="label">Total XP / AP Needed:</span><span id="ResultTotals" class="val">-</span></div>
            <div class="metric"><span class="label">Daily / Weekly AP:</span><span id="ResultAPRates" class="val">-</span></div>
            <div class="metric"><span class="label">Daily Costs:</span><span id="ResultDailyCost" class="val">-</span></div>
            <div class="metric"><span class="label">Total Pyro Spent:</span><span id="ResultTotalPyroxenes" class="val">-</span></div>
            <div class="metric"><span class="label">Total Tactical Coins:</span><span id="ResultTotalCoins" class="val">-</span></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
